version: "3.9"

services:
  etl:
    build: ./etl
    container_name: urban_etl
    volumes:
      - ./etl:/app
    command: ["python", "pipeline.py"]

  api:
    build: ./api
    container_name: urban_api
    ports:
      - "3000:3000"
    volumes:
      - ./etl/gold:/app/data
    environment:
      - NODE_ENV=production
    depends_on:
      - etl

  dashboard:
    build: ./dashboard
    container_name: urban_dashboard
    ports:
      - "5173:80"
    depends_on:
      - api
